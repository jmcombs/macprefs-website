<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-primary); padding: 22px; }
  .label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-tertiary); margin-bottom: 12px; }
  .swatches { display:flex; gap: 14px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Swatch } = window.BluePSL10KDesignSystem_ff9c76;
  function Demo() {
    return (
      <div>
        <div className="label">Swatch · click to copy hex</div>
        <div className="swatches">
          <Swatch color="var(--psl-path-blue)" name="Path Blue" hex="#3465a4" size="lg" copyable />
          <Swatch color="var(--latte-mauve)" name="Mauve" hex="#8839ef" size="lg" copyable />
          <Swatch color="var(--latte-teal)" name="Teal" hex="#179299" size="lg" copyable />
          <Swatch color="var(--latte-peach)" name="Peach" hex="#fe640b" size="lg" shape="circle" copyable />
          <Swatch color="var(--latte-green)" name="Green" hex="#40a02b" size="lg" shape="circle" copyable />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
