<!-- @dsCard group="Type" viewport="700x230" name="Type Families" subtitle="Instrument Serif display · Manrope UI · JetBrains Mono code" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-primary); }
  .wrap { padding: 20px 24px; display:flex; flex-direction:column; gap: 16px; }
  .row { display:flex; align-items:baseline; gap: 18px; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
  .row:last-child { border-bottom: 0; padding-bottom:0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); width: 130px; flex: none; }
  .serif { font-family: var(--font-serif); font-size: 44px; line-height: 1; }
  .sans { font-family: var(--font-sans); font-size: 26px; font-weight: 600; letter-spacing: var(--tracking-snug); }
  .mono { font-family: var(--font-mono); font-size: 21px; font-weight: 500; }
  .it { font-style: italic; color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="tag">Instrument Serif<br>display</span><span class="serif">Unapologetically <span class="it">posh.</span></span></div>
    <div class="row"><span class="tag">Manrope<br>UI · body</span><span class="sans">Eye-friendly pastels for long sessions</span></div>
    <div class="row"><span class="tag">JetBrains Mono<br>code · prompt</span><span class="mono">~/Projects/myapp git:(main) ✓</span></div>
  </div>
</body>
</html>
