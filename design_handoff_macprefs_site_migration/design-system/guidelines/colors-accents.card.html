<!-- @dsCard group="Colors" viewport="700x180" name="Accents — Catppuccin Latte" subtitle="The 14 pastel accents that carry status, syntax & spice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 18px 20px; }
  .sw { border-radius: var(--radius-sm); height: 54px; box-shadow: var(--shadow-xs); }
  .cell { display: flex; flex-direction: column; gap: 5px; }
  .meta { display:flex; flex-direction:column; line-height:1.25; }
  .nm { font-size: 11px; font-weight: 600; }
  .hx { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="sw" style="background:var(--latte-rosewater)"></div><div class="meta"><span class="nm">Rosewater</span><span class="hx">#dc8a78</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-flamingo)"></div><div class="meta"><span class="nm">Flamingo</span><span class="hx">#dd7878</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-pink)"></div><div class="meta"><span class="nm">Pink</span><span class="hx">#ea76cb</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-mauve)"></div><div class="meta"><span class="nm">Mauve</span><span class="hx">#8839ef</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-red)"></div><div class="meta"><span class="nm">Red</span><span class="hx">#d20f39</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-maroon)"></div><div class="meta"><span class="nm">Maroon</span><span class="hx">#e64553</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-peach)"></div><div class="meta"><span class="nm">Peach</span><span class="hx">#fe640b</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-yellow)"></div><div class="meta"><span class="nm">Yellow</span><span class="hx">#df8e1d</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-green)"></div><div class="meta"><span class="nm">Green</span><span class="hx">#40a02b</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-teal)"></div><div class="meta"><span class="nm">Teal</span><span class="hx">#179299</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-sky)"></div><div class="meta"><span class="nm">Sky</span><span class="hx">#04a5e5</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-sapphire)"></div><div class="meta"><span class="nm">Sapphire</span><span class="hx">#209fb5</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-blue)"></div><div class="meta"><span class="nm">Blue</span><span class="hx">#1e66f5</span></div></div>
    <div class="cell"><div class="sw" style="background:var(--latte-lavender)"></div><div class="meta"><span class="nm">Lavender</span><span class="hx">#7287fd</span></div></div>
  </div>
</body>
</html>
