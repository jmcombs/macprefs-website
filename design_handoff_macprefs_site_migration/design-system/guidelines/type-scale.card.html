<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="From 12px mono captions to the 76px serif hero" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-primary); }
  .wrap { padding: 18px 24px; display:flex; flex-direction:column; gap: 9px; }
  .line { display:flex; align-items:baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 116px; flex:none; }
  .s { font-weight: 600; letter-spacing: var(--tracking-tight); line-height: 1.05; color: var(--text-primary); white-space:nowrap; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">5xl · 76 / display</span><span class="s" style="font-family:var(--font-serif); font-weight:400; font-size:48px;">Bring the spice</span></div>
    <div class="line"><span class="tag">3xl · 42</span><span class="s" style="font-size:34px;">Brew the theme</span></div>
    <div class="line"><span class="tag">2xl · 32</span><span class="s" style="font-size:28px;">A unified palette</span></div>
    <div class="line"><span class="tag">xl · 25</span><span class="s" style="font-size:23px;">Section heading</span></div>
    <div class="line"><span class="tag">lg · 20</span><span class="s" style="font-size:19px;">Subheading text</span></div>
    <div class="line"><span class="tag">base · 15</span><span class="s" style="font-size:15px; font-weight:400;">Body copy sits at fifteen pixels.</span></div>
    <div class="line"><span class="tag">sm · 13</span><span class="s" style="font-size:13px; font-weight:400; color:var(--text-secondary);">Labels and dense UI.</span></div>
    <div class="line"><span class="tag">xs · 12 mono</span><span class="s" style="font-family:var(--font-mono); font-size:12px; font-weight:400; color:var(--text-tertiary); letter-spacing:var(--tracking-caps); text-transform:uppercase;">Eyebrow · caption</span></div>
  </div>
</body>
</html>
